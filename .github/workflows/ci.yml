name: Chat Server CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Chat Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check code formatting
      run: cargo fmt --check

    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build project
      run: cargo build --verbose

    - name: Run unit tests
      run: cargo test --verbose

    - name: Build release binaries
      run: cargo build --release

  integration-test:
    name: Integration Test - Server & Client
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build release binaries
      run: cargo build --release

    - name: Run integration test
      run: ./scripts/test-integration.sh

    - name: Test server resilience
      run: |
        echo "🛡️ Testing server resilience with edge cases..."
        
        # Start server
        ./target/release/chat-server &
        SERVER_PID=$!
        
        # Cleanup function
        cleanup() {
            if kill -0 $SERVER_PID 2>/dev/null; then
                kill $SERVER_PID
                wait $SERVER_PID 2>/dev/null || true
            fi
        }
        trap cleanup EXIT
        
        sleep 3
        
        # Test rapid connections and disconnections
        echo "⚡ Testing rapid connections..."
        for i in {1..5}; do
            echo "send Quick test $i" | timeout 5 ./target/release/chat-client --host 127.0.0.1 --port 8080 --username "stress-test-$i" > /dev/null 2>&1 &
        done
        
        # Wait for clients to finish
        sleep 8
        
        # Verify server is still alive
        if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ Server crashed during stress test"
            exit 1
        fi
        
        echo "✅ Server resilience test passed!"

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run benchmarks
      run: |
        echo "📊 Running performance benchmarks..."
        cd chat-server
        cargo bench --verbose
        
        # Check if criterion results were generated (they go to workspace target dir)
        if [ -d "../target/criterion" ]; then
          echo "✅ Benchmark results generated successfully"
          ls -la ../target/criterion/
        else
          echo "⚠️ No benchmark results found"
          exit 1
        fi
        
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: benchmark-results
        path: target/criterion/
        if-no-files-found: error

    - name: Create benchmark report and comment on PR
      if: success() && github.event_name == 'pull_request'
      run: |
        echo "📊 Creating downloadable benchmark report for PR..."
        
        # Create a compressed benchmark report
        cd target/criterion
        zip -r ../../benchmark-report-${{ github.sha }}.zip . -x "*/.*"
        cd ../..
        
        # Extract some key metrics for the comment
        THROUGHPUT_SUMMARY=""
        if [ -f "target/criterion/chat_server_throughput/report/index.html" ]; then
          THROUGHPUT_SUMMARY="✅ Throughput benchmarks completed"
        else
          THROUGHPUT_SUMMARY="⚠️ Throughput benchmarks may have issues"
        fi
        
        LATENCY_SUMMARY=""
        if [ -f "target/criterion/message_latency/report/index.html" ]; then
          LATENCY_SUMMARY="✅ Latency benchmarks completed"
        else
          LATENCY_SUMMARY="⚠️ Latency benchmarks may have issues"
        fi
        
        # Upload the benchmark file to a temporary location and get download URL
        # For now, we'll reference the workflow artifact
        
        # Create PR comment with file reference
        cat > benchmark_summary.md << EOF
        ## 📊 Performance Benchmark Results
        
        The performance benchmarks have completed successfully! 🎉
        
        ### Test Results Summary
        - **Throughput Tests**: $THROUGHPUT_SUMMARY
        - **Latency Tests**: $LATENCY_SUMMARY
        
        ### 📁 Download Benchmark Report
        
        **Method 1: Workflow Artifact**
        1. Go to the [Actions tab](../../../actions/runs/${{ github.run_id }})
        2. Download the "benchmark-results" artifact
        
        **Method 2: PR-Specific Report**
        A dedicated report for this PR is also available as an artifact named "pr-benchmark-report-${{ github.event.number }}"
        
        ### Benchmark Details
        The report includes:
        - 📈 Interactive performance charts
        - 📊 Detailed timing measurements  
        - 🔍 Statistical analysis of results
        - 📋 Comparison with previous runs
        
        ---
        🤖 *Automated benchmark report for commit \`${{ github.sha }}\`*
        EOF
        
        # Post comment to PR using GitHub CLI
        if command -v gh >/dev/null 2>&1; then
          gh pr comment ${{ github.event.number }} --body-file benchmark_summary.md
        else
          echo "GitHub CLI not available, benchmark summary:"
          cat benchmark_summary.md
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload PR-specific benchmark report
      if: success() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: pr-benchmark-report-${{ github.event.number }}
        path: target/criterion/
        if-no-files-found: warn