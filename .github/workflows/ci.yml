name: Chat Server CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Chat Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check code formatting
      run: cargo fmt --check

    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build project
      run: cargo build --verbose

    - name: Run unit tests
      run: cargo test --verbose

    - name: Build release binaries
      run: cargo build --release

  integration-test:
    name: Integration Test - Server & Client
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build release binaries
      run: cargo build --release

    - name: Run integration test
      run: ./scripts/test-integration.sh

    - name: Test server resilience
      run: |
        echo "🛡️ Testing server resilience with edge cases..."
        
        # Start server
        ./target/release/chat-server &
        SERVER_PID=$!
        
        # Cleanup function
        cleanup() {
            if kill -0 $SERVER_PID 2>/dev/null; then
                kill $SERVER_PID
                wait $SERVER_PID 2>/dev/null || true
            fi
        }
        trap cleanup EXIT
        
        sleep 3
        
        # Test rapid connections and disconnections
        echo "⚡ Testing rapid connections..."
        for i in {1..5}; do
            echo "send Quick test $i" | timeout 5 ./target/release/chat-client --host 127.0.0.1 --port 8080 --username "stress-test-$i" > /dev/null 2>&1 &
        done
        
        # Wait for clients to finish
        sleep 8
        
        # Verify server is still alive
        if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ Server crashed during stress test"
            exit 1
        fi
        
        echo "✅ Server resilience test passed!"

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run benchmarks
      run: |
        echo "📊 Running performance benchmarks..."
        cd chat-server
        cargo bench
        
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: chat-server/target/criterion/